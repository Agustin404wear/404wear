<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404wear</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background-color: #0a0a0a;
      color: white;
      font-family: 'Kanit', sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 1rem 2rem;
      align-items: center;
      border-bottom: 1px solid #333;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #7f00ff;
      text-shadow: 0 0 8px #7f00ff;
    }

    .tagline {
      font-size: 0.9rem;
      color: #aaa;
    }

    .hero-image {
      width: 100%;
      max-height: 80vh;
      object-fit: cover;
      display: block;
    }

    .poetic-text {
      text-align: center;
      font-size: 1rem;
      color: #aaa;
      padding: 2rem 1rem 1rem;
    }

    .section-title {
      text-align: center;
      font-size: 2rem;
      color: #7f00ff;
      margin-top: 3rem;
    }

    .icons {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 10;
    }

    .icons img {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 4px #7f00ff);
      transition: transform 0.2s;
    }

    .icons img:hover {
      transform: scale(1.1);
    }

    footer {
      padding: 2rem;
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      border-top: 1px solid #333;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo">404wear</div>
      <div class="tagline">No es solo lo que vendemos. Es cómo elegimos mostrarlo.</div>
    </div>
  </header>

  <img src="404wear_visual_glow_white_full.png" class="hero-image" />
  <div class="poetic-text">Lo que irradia no siempre se ve.</div>

  <h2 class="section-title">Remeras</h2>
  <img src="404wear_visual_resplandor.png" class="hero-image" />
  <div class="poetic-text">El borde también es territorio.</div>

  <img src="A_digital_photograph_captures_a_dimly_lit,_red-tin.png" class="hero-image" />
  <div class="poetic-text">No somos parte. Somos lo que queda.</div>

  <footer>Contacto: 404wear@gmail.com</footer>

  <div class="icons">
    <a href="#"><img src="whatsapp.png" alt="WhatsApp" /></a>
    <a href="#"><img src="instagram.png" alt="Instagram" /></a>
  </div>
</body>
</html>
