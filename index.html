<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404wear</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: #0a0a0a;
      --text: #ffffff;
      --text-secondary: #888888;
      --accent: #7f00ff;
    }

    body {
      margin: 0;
      background-color: var(--background);
      font-family: 'Kanit', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 2rem;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
      border-bottom: 1px solid #333;
      font-family: Arial, sans-serif;
    }

    .hero {
      text-align: center;
      padding: 4rem 2rem;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .hero p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      padding: 2rem;
      width: 100%;
      max-width: 1000px;
    }

    .product {
      background-color: #111;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      transition: transform 0.2s;
      border: 1px solid #2c2c2c;
    }

    .product:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }

    .product img {
      max-width: 100%;
      border-radius: 8px;
    }

    footer {
      padding: 2rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      border-top: 1px solid #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>404wear</header>
  <section class="hero">
    <h1>Underwear with soul</h1>
    <p>Estilo techno, elegante y under. Diseñado para destacar en la ciudad.</p>
  </section>
  <section class="products">
    <div class="product">
      <img src="remera1.jpg" alt="Remera 1" />
      <p>Remera Oversize Negra</p>
    </div>
    <div class="product">
      <img src="remera2.jpg" alt="Remera 2" />
      <p>Remera Blanca Logo 404</p>
    </div>
  </section>
  <footer>Contacto: 404wear@gmail.com</footer>
</body>
</html>
